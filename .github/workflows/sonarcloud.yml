name: SonarCloud Analysis

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Важно для корректного анализа истории коммитов в SonarCloud

      - name: Set up JDK 23
        uses: actions/setup-java@v3
        with:
          java-version: 23
          distribution: 'zulu'

      - name: Compile Java code
        run: |
          mkdir -p telephone-task/out
          javac -d telephone-task/out telephone-task/src/Main.java

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Нужен для получения PR-информации (создается GitHub автоматически)
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}    # Токен, который добавили в Secrets
